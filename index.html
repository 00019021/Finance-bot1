<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Finance — UZS Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F0E0D;--bg2:#181614;--bg3:#222019;--bg4:#2A2720;
  --border:#2E2B24;--border2:#3A362D;--border3:#4A453A;
  --text:#F2EDE4;--text2:#A89F8E;--text3:#6B6356;
  --gold:#C8A96E;--gold2:#E2C98A;--gold3:#F0DFA8;
  --green:#4CAF83;--green-bg:#0D2016;--green-text:#5FCF99;
  --red:#D95F5F;--red-bg:#200D0D;--red-text:#E88080;
  --c4168:#5A91D4;--c4168bg:rgba(90,145,212,.12);
  --c8142:#9B7BE8;--c8142bg:rgba(155,123,232,.12);
  --c4991:#C8A96E;--c4991bg:rgba(200,169,110,.12);
  --ccash:#4CAF83;--ccashbg:rgba(76,175,131,.12);
  --radius:12px;--radius-sm:8px;--radius-lg:18px;--radius-xl:24px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* ── Keyframes ─────────────────────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes barGrow{from{width:0}to{width:var(--w)}}
@keyframes donutSpin{from{stroke-dashoffset:var(--dash-from)}to{stroke-dashoffset:var(--dash-to)}}
@keyframes ripple{0%{transform:scale(0);opacity:.6}100%{transform:scale(2.5);opacity:0}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,169,110,.2)}50%{box-shadow:0 0 0 8px rgba(200,169,110,0)}}
@keyframes navPop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes numberRoll{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,12px)}}
@keyframes lineIn{from{stroke-dashoffset:var(--path-len)}to{stroke-dashoffset:0}}

/* ── Stagger utilities ── */
.stagger>*{opacity:0;animation:fadeUp .45s cubic-bezier(.22,1,.36,1) forwards}
.stagger>*:nth-child(1){animation-delay:.04s}
.stagger>*:nth-child(2){animation-delay:.09s}
.stagger>*:nth-child(3){animation-delay:.14s}
.stagger>*:nth-child(4){animation-delay:.19s}
.stagger>*:nth-child(5){animation-delay:.24s}
.stagger>*:nth-child(6){animation-delay:.29s}
.stagger>*:nth-child(7){animation-delay:.34s}
.stagger>*:nth-child(8){animation-delay:.39s}
.stagger>*:nth-child(n+9){animation-delay:.44s}

.tab-enter{animation:scaleIn .3s cubic-bezier(.22,1,.36,1)}

/* ── App shell ── */
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 0 88px}
.header{padding:22px 20px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.header h1{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);letter-spacing:-.5px}
.header-right{display:flex;align-items:center;gap:10px}
.month-badge{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.sign-out-btn{background:none;border:.5px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.sign-out-btn:hover{border-color:var(--red);color:var(--red-text)}
.content{flex:1;padding:0 16px}

/* ── Auth ── */
.auth-screen{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.auth-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.auth-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 8s ease-in-out infinite}
.auth-orb1{width:300px;height:300px;background:rgba(200,169,110,.07);top:-80px;right:-60px}
.auth-orb2{width:200px;height:200px;background:rgba(76,175,131,.05);bottom:0;left:-40px;animation-delay:-4s}
.auth-logo{font-family:'DM Serif Display',serif;font-size:52px;color:var(--text);letter-spacing:-2px;margin-bottom:4px;text-align:center;position:relative;z-index:1}
.auth-tagline{font-size:13px;color:var(--text3);text-align:center;margin-bottom:36px;position:relative;z-index:1}
.auth-card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-xl);padding:28px 24px;width:100%;position:relative;z-index:1;animation:scaleIn .5s cubic-bezier(.22,1,.36,1)}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;margin-bottom:24px}
.auth-tab{padding:8px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-radius:6px;transition:all .2s}
.auth-tab.active{background:var(--bg2);color:var(--text)}
.auth-form .form-row{margin-bottom:14px}
.auth-form label{display:block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.auth-form input{width:100%;background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:all .2s}
.auth-form input:focus{border-color:var(--gold);background:var(--bg4)}
.auth-submit{width:100%;padding:13px;background:var(--gold);color:#0F0E0D;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;margin-top:4px;transition:all .2s;letter-spacing:.03em;position:relative;overflow:hidden}
.auth-submit:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,169,110,.3)}
.auth-submit:active{transform:translateY(0)}
.auth-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-error{color:var(--red-text);font-size:12px;margin-top:10px;text-align:center;min-height:18px}

/* ── Loading ── */
.loading-screen{max-width:480px;margin:0 auto;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.loading-screen .logo{font-family:'DM Serif Display',serif;font-size:40px;color:var(--text);opacity:.5;animation:pulse 2s ease-in-out infinite}
.spinner{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}

/* ── Bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(12,11,10,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:.5px solid var(--border);padding:8px 4px env(safe-area-inset-bottom,12px);display:flex;justify-content:space-around;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border:none;background:none;cursor:pointer;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;transition:color .2s;border-radius:8px;position:relative;overflow:hidden}
.nav-btn .n-icon{font-size:19px;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.nav-btn.active{color:var(--gold)}
.nav-btn.active .n-icon{transform:scale(1.15)}
.nav-btn .n-dot{position:absolute;top:6px;right:calc(50% - 14px);width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:0;transition:opacity .2s;animation:glowPulse 2s ease-in-out infinite}
.nav-btn.active .n-dot{opacity:1}

/* ── FAB ── */
.fab{position:fixed;bottom:76px;right:calc(50% - 240px + 16px);width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0F0E0D;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(200,169,110,.4);transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:101;font-weight:300;line-height:1}
.fab:hover{transform:scale(1.1) rotate(90deg);box-shadow:0 8px 32px rgba(200,169,110,.5)}
.fab:active{transform:scale(.93)}
@media(max-width:480px){.fab{right:16px}}

/* ── Cards ── */
.card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:border-color .2s}
.card+.card{margin-top:10px}
.card:hover{border-color:var(--border2)}
.section-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:20px 0 10px;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:.5px;background:var(--border)}

/* ── Balance hero ── */
.balance-hero{background:linear-gradient(145deg,#1A1814 0%,#1E1B12 50%,#191611 100%);border:.5px solid var(--border2);border-radius:var(--radius-xl);padding:22px;margin-top:14px;position:relative;overflow:hidden}
.hero-orb{position:absolute;border-radius:50%;pointer-events:none}
.hero-orb1{width:180px;height:180px;background:radial-gradient(circle,rgba(200,169,110,.1) 0%,transparent 70%);top:-60px;right:-40px}
.hero-orb2{width:120px;height:120px;background:radial-gradient(circle,rgba(76,175,131,.07) 0%,transparent 70%);bottom:-30px;left:-20px}
.hero-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.hero-amount{font-family:'DM Serif Display',serif;font-size:42px;letter-spacing:-1.5px;line-height:1;position:relative}
.hero-amount .curr{font-size:15px;color:var(--text3);font-family:'DM Sans',sans-serif;font-weight:300;margin-left:6px;vertical-align:middle}
.hero-row{display:flex;gap:0;margin-top:16px;border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.hero-stat{flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:3px}
.hero-stat+.hero-stat{border-left:.5px solid var(--border)}
.hero-stat .hs-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.hero-stat .hs-val{font-size:15px;font-weight:600}
.progress-outer{margin-top:14px}
.progress-track{width:100%;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1);position:relative}
.progress-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.25) 50%,transparent 100%);background-size:200% 100%;animation:shimmer 2s linear infinite}
.progress-note{font-size:11px;color:var(--text3);margin-top:6px;display:flex;justify-content:space-between}

/* ── Animated number ── */
.anim-num{display:inline-block;overflow:hidden;vertical-align:bottom}
.anim-num span{display:block;animation:numberRoll .5s cubic-bezier(.22,1,.36,1) both}

/* ── Month nav ── */
.month-nav{display:flex;align-items:center;border:.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.month-nav-btn{background:none;border:none;padding:7px 14px;color:var(--text3);cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;transition:all .15s}
.month-nav-btn:hover{color:var(--gold);background:var(--bg3)}
.month-nav-btn:disabled{opacity:.2;pointer-events:none}
.month-nav-lbl{padding:7px 14px;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.05em;border-left:.5px solid var(--border);border-right:.5px solid var(--border);min-width:110px;text-align:center;text-transform:uppercase}

/* ── Starting bal form ── */
.bal-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border)}
.bal-row:last-of-type{border-bottom:none}
.bal-pm{display:flex;align-items:center;gap:8px;width:88px;flex-shrink:0}
.bal-pm-icon{font-size:14px}
.bal-pm-lbl{font-size:13px;font-weight:500;color:var(--text2)}
.bal-input-wrap{flex:1;position:relative}
.bal-input{width:100%;background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--radius-sm);padding:8px 38px 8px 10px;font-size:13px;font-weight:500;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:all .2s}
.bal-input:focus{border-color:var(--gold);background:var(--bg4)}
.curr-tag{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3);pointer-events:none;font-weight:600;letter-spacing:.04em}
.bal-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:12px;margin-top:6px;border-top:.5px solid var(--border2)}
.save-bal-btn{width:100%;margin-top:12px;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0F0E0D;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;transition:all .2s;letter-spacing:.02em}
.save-bal-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,169,110,.3)}
.save-bal-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── TX items ── */
.tx-list{display:flex;flex-direction:column;gap:6px}
.tx-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);transition:all .2s;cursor:default;position:relative;overflow:hidden}
.tx-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;opacity:0;transition:opacity .2s}
.tx-item.income::before{background:var(--green);opacity:1}
.tx-item.expense::before{background:var(--red);opacity:1}
.tx-item:hover{border-color:var(--border2);transform:translateX(2px)}
.tx-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:transform .2s}
.tx-item:hover .tx-icon{transform:scale(1.1)}
.tx-info{flex:1;min-width:0}
.tx-cat{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.pay-chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;letter-spacing:.02em}
.tx-note{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.tx-right{text-align:right;flex-shrink:0}
.tx-amount{font-size:14px;font-weight:600}
.tx-date-lbl{font-size:10px;color:var(--text3);margin-top:1px}
.tx-delete{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:4px 6px;border-radius:6px;opacity:0;transition:all .15s;flex-shrink:0}
.tx-item:hover .tx-delete{opacity:1}
.tx-delete:hover{color:var(--red);background:var(--red-bg)}

/* ── Calendar ── */
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dow{text-align:center;font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:5px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{min-height:56px;border:.5px solid var(--border);border-radius:var(--radius-sm);padding:5px;cursor:pointer;transition:all .2s;background:var(--bg2);display:flex;flex-direction:column;position:relative}
.cal-cell.empty{background:none;border-color:transparent;cursor:default}
.cal-cell:not(.empty):hover{border-color:var(--border3);transform:scale(1.04);z-index:1;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.cal-cell.today{border-color:var(--gold)}
.cal-cell.selected{border-color:var(--text2);background:var(--bg3)}
.cal-cell.today.selected{border-color:var(--gold);background:rgba(200,169,110,.07)}
.cal-num{font-size:11px;font-weight:600;color:var(--text3);text-align:right;line-height:1;margin-bottom:3px}
.cal-cell.today .cal-num{color:var(--gold);text-shadow:0 0 8px rgba(200,169,110,.5)}
.cal-dots{display:flex;flex-direction:column;gap:1px;flex:1}
.cal-dot-val{font-size:9px;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.today-ring{position:absolute;inset:-1px;border:1.5px solid var(--gold);border-radius:calc(var(--radius-sm) + 1px);opacity:.4;pointer-events:none;animation:glowPulse 2.5s ease-in-out infinite}

.day-panel{background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--radius-xl);padding:18px;margin-top:12px;animation:slideDown .3s cubic-bezier(.22,1,.36,1)}
.day-panel-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.day-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);line-height:1.1}
.day-net{font-size:12px;font-weight:500;margin-top:3px}
.add-day-btn{background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--radius-sm);padding:7px 14px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--gold);cursor:pointer;transition:all .2s;white-space:nowrap}
.add-day-btn:hover{background:var(--gold);color:#0F0E0D;border-color:var(--gold);transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,169,110,.3)}

/* ── Filter chips ── */
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:5px 12px;font-size:11px;font-weight:600;border-radius:20px;border:.5px solid var(--border2);background:none;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.03em;transition:all .2s;position:relative;overflow:hidden}
.chip:hover{border-color:var(--border3);color:var(--text2)}
.chip.active{background:var(--gold);border-color:var(--gold);color:#0F0E0D;box-shadow:0 2px 12px rgba(200,169,110,.3)}

/* ── Charts ── */
.chart-wrap{position:relative;width:100%}
.donut-wrap{display:flex;align-items:center;gap:20px;margin-top:6px}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-center-val{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);letter-spacing:-.5px}
.donut-center-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0}
.legend-row{display:flex;align-items:center;gap:7px;cursor:default;transition:opacity .15s}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-lbl{font-size:11px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend-val{font-size:11px;font-weight:600;color:var(--text);text-align:right;white-space:nowrap}
.legend-pct{font-size:10px;color:var(--text3);width:28px;text-align:right;flex-shrink:0}

/* Bar chart */
.bar-chart{width:100%;margin-top:8px}
.bar-chart-bars{display:flex;align-items:flex-end;gap:3px;height:80px;padding-bottom:4px}
.bc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default}
.bc-bar-wrap{width:100%;flex:1;display:flex;flex-direction:column;justify-content:flex-end}
.bc-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:opacity .2s;position:relative;overflow:hidden}
.bc-bar::after{content:'';position:absolute;top:0;left:0;right:0;height:30%;background:linear-gradient(to bottom,rgba(255,255,255,.15),transparent);border-radius:3px 3px 0 0}
.bc-bar.animated{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
.bc-lbl{font-size:8px;font-weight:600;color:var(--text3);text-align:center;letter-spacing:.04em}
.bc-col:hover .bc-bar{opacity:.75}

/* Trend line SVG */
.trend-svg{width:100%;overflow:visible}
.trend-line{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.trend-area{opacity:.15}
.trend-dot{transition:r .15s;cursor:default}
.trend-tooltip{pointer-events:none;opacity:0;transition:opacity .15s}

/* Stat bars */
.stat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.stat-bar-lbl{font-size:12px;color:var(--text2);width:105px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}

.stat-bar-fill{height:100%;border-radius:4px;position:relative;overflow:hidden;transition:width .8s cubic-bezier(.4,0,.2,1)}
.stat-bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.2),transparent)}
.stat-bar-val{font-size:11px;font-weight:600;min-width:82px;text-align:right;flex-shrink:0;white-space:nowrap}

/* Pay stat rows */
.pay-stat-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:.5px solid var(--border)}
.pay-stat-row:last-child{border-bottom:none}

.pay-mini-bar{width:70px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pay-mini-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* Insight cards */

.insight-icon{font-size:20px;margin-bottom:6px}

.insight-trend{font-size:10px;font-weight:600;margin-top:4px;display:flex;align-items:center;gap:3px}

/* Day groups */

.day-group-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.day-group-lbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center}

.modal{background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:24px 20px 32px;width:100%;max-width:480px;animation:slideUp .28s cubic-bezier(.22,1,.36,1);max-height:94vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 22px}
.modal-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text);margin-bottom:22px}
.form-row{margin-bottom:16px}
.form-row label{display:block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.form-input,.form-select{width:100%;background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;font-weight:500;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;appearance:none}

let USER=null, txns=[], startBals={};

function todayStr(){return new Date().toISOString().slice(0,10)}
function todayMonth(){return new Date().toISOString().slice(0,7)}
function fmt(n){return Math.abs(Math.round(n)).toLocaleString('ru-RU').replace(/,/g,' ')}
function fmtUZS(n){return fmt(n)+' UZS'}
function monthLabel(ym){const[y,m]=ym.split('-');return new Date(+y,+m-1,1).toLocaleString('en',{month:'short',year:'numeric'}).toUpperCase()}
function dayLabel(d){return new Date(d+'T12:00').toLocaleDateString('en',{weekday:'long',month:'long',day:'numeric'})}
function dayShort(d){return new Date(d+'T12:00').toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'})}
function prevMonth(ym){const[y,m]=ym.split('-').map(Number);return new Date(y,m-2,1).toISOString().slice(0,7)}
function nextMonth(ym){const[y,m]=ym.split('-').map(Number);return new Date(y,m,1).toISOString().slice(0,7)}

function getStartBals(ym){
  const sb=startBals[ym];
  return {'card-4168':0,'card-8142':0,'card-4991':0,'cash':0,...(sb&&typeof sb==='object'?sb:{})};
}
function totalStartBal(ym){return Object.values(getStartBals(ym)).reduce((s,v)=>s+v,0)}
function txnsForMonth(ym,pay){let r=txns.filter(t=>t.date.slice(0,7)===ym);if(pay&&pay!=='all')r=r.filter(t=>t.payment===pay);return r}
function txnsForDay(d){return txns.filter(t=>t.date===d)}
function calcMonth(ym,pay){
  const list=txnsForMonth(ym,pay);
  const bals=getStartBals(ym);
  const start=pay&&pay!=='all'?(bals[pay]||0):totalStartBal(ym);
  const income=list.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=list.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  return{start,income,expense,balance:start+income-expense,list,bals};
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function showAuthTab(mode){
  authMode=mode;
  document.getElementById('tab-signin').className='auth-tab'+(mode==='signin'?' active':'');
  document.getElementById('tab-signup').className='auth-tab'+(mode==='signup'?' active':'');
  document.getElementById('auth-submit').textContent=mode==='signin'?'Sign In':'Create Account';
  document.getElementById('auth-error').textContent='';
  const hint=document.getElementById('signup-hint');
  if(hint)hint.style.display=mode==='signup'?'inline':' none';
}
async function handleAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-password').value;
  const btn=document.getElementById('auth-submit');
  const errEl=document.getElementById('auth-error');
  if(!email||!pw){errEl.textContent='Please fill in all fields.';return}
  if(pw.length<6){errEl.textContent='Password must be at least 6 characters.';return}
  btn.disabled=true;
  btn.textContent=authMode==='signin'?'Signing in…':'Creating account…';
  errEl.style.color='var(--red-text)';
  errEl.textContent='';

    const{error}=await SB.auth.signInWithPassword({email,password:pw});
    if(error){
      errEl.textContent=error.message==='Invalid login credentials'?'Wrong email or password.':error.message;
      btn.disabled=false;btn.textContent='Sign In';

  } else {
    const{data,error}=await SB.auth.signUp({email,password:pw});
    if(error){
      errEl.textContent=error.message;
      btn.disabled=false;btn.textContent='Create Account';
    } else if(data?.session){
      // Email confirmation disabled — logged in immediately
      // onAuthStateChange will handle the rest
    } else {
      // Email confirmation required
      errEl.style.color='var(--green-text)';
      errEl.textContent='✓ Check your email and click the confirmation link, then sign in.';
      btn.disabled=false;btn.textContent='Create Account';
      // Switch to sign in tab
      setTimeout(()=>showAuthTab('signin'),2000);
    }
  }
}
async function signOut(){
  if(realtimeChannel){ SB.removeChannel(realtimeChannel); realtimeChannel=null; }
  await SB.auth.signOut();
  USER=null;txns=[];startBals={};
  document.getElementById('main-app').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  document.getElementById('fab').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

// ── Local cache ───────────────────────────────────────────────────────────────
function cacheKey(uid){return 'fz-cache-'+uid}
function saveCache(uid){
  try{localStorage.setItem(cacheKey(uid),JSON.stringify({txns,startBals,ts:Date.now()}))}catch(e){}
}
function loadCache(uid){
  try{
    const raw=localStorage.getItem(cacheKey(uid));
    if(!raw)return false;
    const c=JSON.parse(raw);
    txns=(c.txns||[]).map(r=>({...r,amount:parseFloat(r.amount)}));
    startBals=c.startBals||{};
    return true;
  }catch(e){return false}
}

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadAllData(uid){
  const[{data:txData},{data:balData}]=await Promise.all([
    SB.from('transactions').select('*').eq('user_id',uid).order('date',{ascending:false}),
    SB.from('starting_balances').select('*').eq('user_id',uid),
  ]);
  if(txData){
    txns=txData.map(r=>({...r,amount:parseFloat(r.amount)}));
    startBals={};
    (balData||[]).forEach(r=>{if(!startBals[r.month])startBals[r.month]={};startBals[r.month][r.payment]=parseFloat(r.amount)});
    saveCache(uid);
  }
}
function dbAddTx(tx){
  // Add locally with a temp id — instant
  const tempId='tmp-'+Date.now();
  txns.unshift({...tx,id:tempId,user_id:USER.id,amount:parseFloat(tx.amount)});
  saveCache(USER.id);
  // Fire-and-forget to Supabase, swap temp id with real one when done
  SB.from('transactions').insert({user_id:USER.id,...tx}).select().single()
    .then(({data,error})=>{
      if(error){console.warn('Supabase tx sync failed:',error.message);return;}
      const idx=txns.findIndex(t=>t.id===tempId);
      if(idx>=0)txns[idx]={...data,amount:parseFloat(data.amount)};
      saveCache(USER.id);
    })
    .catch(e=>console.warn('Supabase tx error:',e.message));
}
function dbDeleteTx(id){
  // Remove locally — instant
  txns=txns.filter(t=>t.id!==id);
  saveCache(USER.id);
  // Fire-and-forget to Supabase
  SB.from('transactions').delete().eq('id',id).eq('user_id',USER.id)
    .then(({error})=>{ if(error) console.warn('Supabase delete failed:',error.message); })
    .catch(e=>console.warn('Supabase delete error:',e.message));
}
function dbSaveBals(ym,bals){
  // Save locally & update state — instant, synchronous
  startBals[ym]=bals;
  saveCache(USER.id);
  // Fire-and-forget to Supabase — never blocks the UI
  const rows=Object.entries(bals).map(([payment,amount])=>({user_id:USER.id,month:ym,payment,amount}));
  SB.from('starting_balances').upsert(rows,{onConflict:'user_id,month,payment'})
    .then(({error})=>{ if(error) console.warn('Supabase bal sync failed:',error.message); })
    .catch(e=>console.warn('Supabase bal sync error:',e.message));
}

// ── Realtime sync ─────────────────────────────────────────────────────────────
let realtimeChannel = null;

function startRealtimeSync(){
  if(realtimeChannel){ SB.removeChannel(realtimeChannel); realtimeChannel=null; }

  realtimeChannel = SB
    .channel('finance-sync-'+USER.id)
    .on('postgres_changes',
      {event:'INSERT', schema:'public', table:'transactions'},
      (payload) => { if(payload.new?.user_id===USER.id) handleRealtimeTx(payload); }
    )
    .on('postgres_changes',
      {event:'UPDATE', schema:'public', table:'transactions'},
      (payload) => { if(payload.new?.user_id===USER.id) handleRealtimeTx(payload); }
    )
    .on('postgres_changes',
      {event:'DELETE', schema:'public', table:'transactions'},
      (payload) => { handleRealtimeTx(payload); } // old row may not have user_id in delete
    )
    .on('postgres_changes',
      {event:'INSERT', schema:'public', table:'starting_balances'},
      (payload) => { if(payload.new?.user_id===USER.id) handleRealtimeBal(payload); }
    )
    .on('postgres_changes',
      {event:'UPDATE', schema:'public', table:'starting_balances'},
      (payload) => { if(payload.new?.user_id===USER.id) handleRealtimeBal(payload); }
    )
    .subscribe((status, err)=>{
      console.log('Realtime status:', status, err||'');
    });
}

function handleRealtimeTx(payload){
  const {eventType, new: row, old: oldRow} = payload;

  if(eventType==='INSERT' && row){
    // Check if we already have it (added by this device with a temp id)
    const tempIdx = txns.findIndex(t => t.id && t.id.startsWith('tmp-'));
    if(tempIdx>=0){
      // Replace the temp record with the real server one
      txns[tempIdx] = {...row, amount:parseFloat(row.amount)};
    } else if(!txns.some(t => t.id === row.id)){
      // New record from another device — add it
      txns.unshift({...row, amount:parseFloat(row.amount)});
    }
    saveCache(USER.id);
    renderTab();

  } else if(eventType==='DELETE'){
    const delId = (oldRow && oldRow.id) || (row && row.id);
    if(delId){
      const before = txns.length;
      txns = txns.filter(t => t.id !== delId);
      if(txns.length !== before){ saveCache(USER.id); renderTab(); }
    }

  } else if(eventType==='UPDATE' && row){
    const idx = txns.findIndex(t => t.id === row.id);
    if(idx>=0){
      txns[idx] = {...row, amount:parseFloat(row.amount)};
      saveCache(USER.id);
      renderTab();
    }
  }
}

function handleRealtimeBal(payload){
  const {eventType, new: row} = payload;
  if((eventType==='INSERT'||eventType==='UPDATE') && row){
    if(!startBals[row.month]) startBals[row.month]={};
    const incoming = parseFloat(row.amount);
    if(startBals[row.month][row.payment] !== incoming){
      startBals[row.month][row.payment] = incoming;
      saveCache(USER.id);
      renderTab();
    }
  }
}

// ── UI ────────────────────────────────────────────────────────────────────────
function showApp(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('main-app').style.display='flex';
  document.getElementById('bottom-nav').style.display='flex';
  document.getElementById('fab').style.display='flex';
  renderTab();
  startRealtimeSync(); // subscribe to live changes from other devices
}
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    const isActive=b.dataset.tab===tab;
    b.classList.toggle('active',isActive);
    if(isActive){b.querySelector('.n-icon').style.animation='navPop .3s cubic-bezier(.34,1.56,.64,1)';setTimeout(()=>b.querySelector('.n-icon').style.animation='',300)}
  });
  document.getElementById('fab').style.display=tab==='stats'?'none':'flex';
  renderTab();
}
function renderTab(){
  document.getElementById('header-month').textContent=monthLabel(viewMonth);
  const c=document.getElementById('content');
  c.innerHTML='';
  const div=document.createElement('div');
  div.className='tab-enter';
  if(activeTab==='dashboard') div.innerHTML=renderDashboard();
  if(activeTab==='calendar')  div.innerHTML=renderCalendar();
  if(activeTab==='history')   div.innerHTML=renderHistory();
  if(activeTab==='stats')     div.innerHTML=renderStats();
  c.appendChild(div);
  bindBalInputs();
  setTimeout(()=>{animateBars();animateNumbers();initCharts()},60);
}

function changeMonth(dir,tab){
  viewMonth=dir>0?nextMonth(viewMonth):prevMonth(viewMonth);
  activeTab=tab;renderTab();
}
function monthNavHTML(tab){
  return`<div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1,'${tab}')">‹</button>
    <div class="month-nav-lbl">${monthLabel(viewMonth)}</div>
    <button class="month-nav-btn" onclick="changeMonth(1,'${tab}')">›</button>
  </div>`;
}

// ── Animate numbers ───────────────────────────────────────────────────────────
function animateNumber(el,target){
  if(!el)return;
  const duration=900,start=performance.now();
  const step=ts=>{
    const p=Math.min((ts-start)/duration,1);
    const ease=1-Math.pow(1-p,4);
    el.textContent=fmt(Math.round(target*ease));
    if(p<1)requestAnimationFrame(step);
    else el.textContent=fmt(target);
  };
  requestAnimationFrame(step);
}
function animateNumbers(){
  document.querySelectorAll('[data-anim-num]').forEach(el=>{
    animateNumber(el,parseFloat(el.dataset.animNum));
  });
}
function animateBars(){
  document.querySelectorAll('[data-bar-w]').forEach((el,i)=>{
    setTimeout(()=>{el.style.width=el.dataset.barW+'%'},i*30);
  });
}

      <div class="hero-label">Current Balance</div>

      </div>
      <div class="hero-row">
        <div class="hero-stat"><div class="hs-lbl">Start</div><div class="hs-val gold"><span data-anim-num="${d.start}">${fmt(d.start)}</span></div></div>
        <div class="hero-stat"><div class="hs-lbl">Income</div><div class="hs-val" style="color:var(--green-text)">+<span data-anim-num="${d.income}">${fmt(d.income)}</span></div></div>
        <div class="hero-stat"><div class="hs-lbl">Spent</div><div class="hs-val" style="color:var(--red-text)">−<span data-anim-num="${d.expense}">${fmt(d.expense)}</span></div></div>
      </div>
      <div class="progress-outer">

        <div class="progress-note"><span>${fmt(d.expense)} spent</span><span>${pct}% of budget</span></div>
      </div>
    </div>

    ${avgDaily||topCat?`

    <div class="insight-row">
      ${avgDaily?`<div class="insight-card">

        <div class="insight-lbl">Avg daily spend</div>
      </div>`:''}

        <div class="insight-icon">${CAT_MAP[topCat.name]?.icon||'📌'}</div>
        <div class="insight-val" style="color:var(--red-text)" data-anim-num="${topCat.amt}">${fmt(topCat.amt)}</div>
        <div class="insight-lbl">Top: ${topCat.name}</div>

    <div class="card">
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Amount you had at the start of the month per card and cash</div>

        <div class="bal-row">
          <div class="bal-pm"><span class="bal-pm-icon">${p.icon}</span><span class="bal-pm-lbl">${p.label}</span></div>
          <div class="bal-input-wrap">

function bindBalInputs(){
  PAYMENTS.forEach(p=>{const el=document.getElementById('sb-'+p.id);if(el)el.addEventListener('input',updateBalTotal)});
}
function updateBalTotal(){
  let t=0;PAYMENTS.forEach(p=>{const el=document.getElementById('sb-'+p.id);if(el)t+=parseFloat(el.value)||0});
  const el=document.getElementById('bal-total-preview');if(el)el.textContent=fmtUZS(t);
}
function saveBalances(){
  const bals={};
  PAYMENTS.forEach(p=>{const el=document.getElementById('sb-'+p.id);bals[p.id]=parseFloat(el?el.value:0)||0});
  dbSaveBals(viewMonth,bals); // instant — no await needed
  renderTab();
  showToast('✓ Balances saved');
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function renderCalendar(){
  const[y,m]=viewMonth.split('-').map(Number);
  const firstDow=new Date(y,m-1,1).getDay(),daysInMonth=new Date(y,m,0).getDate(),today=todayStr();
  const byDay={};
  txnsForMonth(viewMonth).forEach(t=>{
    if(!byDay[t.date])byDay[t.date]={inc:0,exp:0};
    if(t.type==='income')byDay[t.date].inc+=t.amount;else byDay[t.date].exp+=t.amount;
  });
  let cells='';
  for(let i=0;i<firstDow;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${viewMonth}-${String(d).padStart(2,'0')}`;
    const data=byDay[ds];
    const cls=['cal-cell',ds===today?'today':'',ds===selDate?'selected':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}" onclick="selectDay('${ds}')">
      ${ds===today?'<div class="today-ring"></div>':''}
      <div class="cal-num">${d}</div>
      <div class="cal-dots">
        ${data&&data.inc>0?`<div class="cal-dot-val" style="color:var(--green-text)">+${fmt(data.inc)}</div>`:''}
        ${data&&data.exp>0?`<div class="cal-dot-val" style="color:var(--red-text)">−${fmt(data.exp)}</div>`:''}
      </div>
    </div>`;
  }
  const dayTxns=txnsForDay(selDate).sort((a,b)=>a.type.localeCompare(b.type));
  const net=dayTxns.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);
  const netColor=net>=0?'var(--green-text)':'var(--red-text)';
  return`
  <div class="stagger">
    <div style="margin-top:16px">${monthNavHTML('calendar')}</div>
    <div style="margin-top:12px">
      <div class="cal-header">${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>
    <div class="day-panel">
      <div class="day-panel-head">
        <div>
          <div class="day-title">${dayLabel(selDate)}</div>
          ${dayTxns.length?`<div class="day-net" style="color:${netColor}">Net: ${net>=0?'+':'−'}${fmt(net)} UZS</div>`:'<div class="day-net" style="color:var(--text3)">No transactions</div>'}
        </div>
        <button class="add-day-btn" onclick="openModal('${selDate}')">+ Add</button>
      </div>
      <div class="tx-list stagger">
        ${dayTxns.length?dayTxns.map(t=>txItemHTML(t,true)).join(''):`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Tap "+ Add" to log a transaction</div></div>`}
      </div>
    </div>
    <div style="height:8px"></div>
  </div>`;
}
function selectDay(ds){selDate=ds;if(viewMonth!==ds.slice(0,7))viewMonth=ds.slice(0,7);renderTab()}

// ── History ───────────────────────────────────────────────────────────────────
function renderHistory(){
  let list=txnsForMonth(viewMonth,histPayFilter==='all'?null:histPayFilter).sort((a,b)=>b.date.localeCompare(a.date));
  const byDay={};list.forEach(t=>{(byDay[t.date]=byDay[t.date]||[]).push(t)});
  const days=Object.keys(byDay).sort((a,b)=>b.localeCompare(a));
  const chips=`<div class="filter-chips">
    <button class="chip ${histPayFilter==='all'?'active':''}" onclick="setHistPay('all')">All</button>
    ${PAYMENTS.map(p=>`<button class="chip ${histPayFilter===p.id?'active':''}" style="${histPayFilter===p.id?`background:${p.chipBg};border-color:${p.chip};color:${p.chip}`:''}" onclick="setHistPay('${p.id}')">${p.icon} ${p.label}</button>`).join('')}
  </div>`;
  const groups=days.map(day=>{
    const dt=byDay[day];
    const net=dt.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);
    const nc=net>=0?'var(--green-text)':'var(--red-text)';
    return`<div class="day-group">
      <div class="day-group-head">
        <div class="day-group-lbl">${dayShort(day)}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;font-weight:600;color:${nc}">${net>=0?'+':'−'}${fmt(net)} UZS</span>
          <button onclick="selectDay('${day}');switchTab('calendar')" style="background:none;border:.5px solid var(--border);border-radius:6px;padding:2px 8px;font-size:10px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s">Edit</button>
        </div>
      </div>
      <div class="tx-list stagger">${dt.map(t=>txItemHTML(t,true)).join('')}</div>
    </div>`;
  }).join('');
  return`
  <div class="stagger">
    <div style="margin-top:16px">${monthNavHTML('history')}</div>
    <div class="section-label">Filter by payment</div>
    ${chips}
    ${days.length?groups:`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No transactions for this filter</div></div>`}
    <div style="height:8px"></div>
  </div>`;
}

function setStatsPay(f){statsPayFilter=f;renderTab()}

// ── Charts ────────────────────────────────────────────────────────────────────
function initCharts(){
  initDonut();
  initBarChart();
}

function initDonut(){
  const svg=document.getElementById('donut-svg');
  if(!svg)return;
  const d=calcMonth(viewMonth,statsPayFilter==='all'?null:statsPayFilter);
  const expByCat={};
  d.list.filter(t=>t.type==='expense').forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount});
  const entries=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const total=entries.reduce((s,[,v])=>s+v,0);
  if(!total){svg.innerHTML='';return}
  const cx=70,cy=70,r=55,stroke=18;
  const circ=2*Math.PI*r;
  let offset=0;
  let paths='';
  entries.forEach(([cat,val],i)=>{
    const ci=CAT_MAP[cat]||{color:'#6B6356'};
    const frac=val/total;
    const dash=frac*circ;
    const gap=circ-dash;
    const delay=i*80;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${ci.color}"
      stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}"
      stroke-dashoffset="${circ-offset}" stroke-linecap="butt"
      style="transform-origin:${cx}px ${cy}px;transform:rotate(-90deg);
      transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1) ${delay}ms;
      opacity:.9"/>`;
    offset+=dash;
  });
  svg.innerHTML=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="${stroke}"/>
    <circle cx="${cx}" cy="${cy}" r="${r-stroke/2-2}" fill="var(--bg2)"/>
    ${paths}`;
}

function initBarChart(){
  const bars=document.querySelectorAll('.bc-bar[id^="bar-"]');
  if(!bars.length)return;
  const wrap=document.getElementById('bar-chart-wrap');
  if(!wrap)return;
  const daily=JSON.parse(wrap.dataset.daily||'[]');
  const max=parseFloat(wrap.dataset.max||1);
  bars.forEach((bar,i)=>{
    const h=daily[i]?Math.max(4,Math.round((daily[i]/max)*100)):0;
    setTimeout(()=>{bar.style.height=h+'%';bar.style.transition='height .5s cubic-bezier(.22,1,.36,1)'},i*15);
  });
}

// ── TX item HTML ──────────────────────────────────────────────────────────────
function txItemHTML(t,hideDate){
  const c=CAT_MAP[t.category]||{icon:'📌',color:'#6B6356'};
  const p=PM_MAP[t.payment]||PAYMENTS[0];

    <div class="tx-icon" style="background:${c.color}22">${c.icon}</div>

      <div class="tx-cat">${t.category}</div>
      <div class="tx-meta">

function deleteTx(id){
  if(!confirm('Delete this transaction?'))return;
  dbDeleteTx(id); // instant
  renderTab();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(date){
  modalDate=date||todayStr();
  modalType='expense';modalPayment='card-4168';
  document.getElementById('inp-date').value=modalDate;
  document.getElementById('inp-amount').value='';
  document.getElementById('inp-note').value='';
  document.getElementById('modal-title').textContent=`Add Transaction`;
  renderModalType();renderPayGrid();
  document.getElementById('modal-backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('inp-amount').focus(),200);
}
function closeModal(){document.getElementById('modal-backdrop').classList.remove('open')}
function setType(t){modalType=t;renderModalType()}
function renderModalType(){
  document.getElementById('btn-expense').className='type-btn'+(modalType==='expense'?' active-expense':'');
  document.getElementById('btn-income').className='type-btn'+(modalType==='income'?' active-income':'');
  const cats=modalType==='income'?INCOME_CATS:EXPENSE_CATS;
  document.getElementById('inp-cat').innerHTML=cats.map(c=>`<option value="${c.name}">${c.icon} ${c.name}</option>`).join('');
}
function renderPayGrid(){
  document.getElementById('pay-grid').innerHTML=PAYMENTS.map(p=>`
    <button class="pay-btn${modalPayment===p.id?' selected':''}" onclick="setPayment('${p.id}')">
      <span class="pb-icon">${p.icon}</span>${p.label}
    </button>`).join('');
}
function setPayment(id){modalPayment=id;renderPayGrid()}
function saveTx(){
  const amount=parseFloat(document.getElementById('inp-amount').value);
  const date=document.getElementById('inp-date').value;
  const category=document.getElementById('inp-cat').value;
  const note=document.getElementById('inp-note').value.trim();
  if(!amount||amount<=0||!date){showToast('⚠️ Enter a valid amount');return}
  dbAddTx({type:modalType,amount,date,category,payment:modalPayment,note}); // instant
  closeModal();selDate=date;renderTab();showToast('✓ Transaction saved');
}
document.getElementById('modal-backdrop').addEventListener('click',function(e){if(e.target===this)closeModal()});

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg){
  let el=document.getElementById('toast');
  if(!el){
    el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg2);border:.5px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:all .3s cubic-bezier(.22,1,.36,1);pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)';
    document.body.appendChild(el);
  }
  el.textContent=msg;
  el.style.opacity='1';el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(-50%) translateY(10px)'},2500);
}

// ── Setup screen (shown when keys are not yet configured) ─────────────────────
function showSetupScreen(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('main-app').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  document.getElementById('fab').style.display='none';
  let setup=document.getElementById('setup-screen');
  if(!setup){
    setup=document.createElement('div');
    setup.id='setup-screen';
    setup.style.cssText='max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)';
    setup.innerHTML=`
      <div style="font-family:\'DM Serif Display\',serif;font-size:42px;color:var(--text);letter-spacing:-1px;margin-bottom:8px;text-align:center">Finance</div>
      <div style="font-size:13px;color:var(--text3);text-align:center;margin-bottom:32px">One-time setup required</div>
      <div style="background:var(--bg2);border:.5px solid var(--border);border-radius:18px;padding:24px;width:100%;animation:scaleIn .4s cubic-bezier(.22,1,.36,1)">
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px">Connect to Supabase</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:20px;line-height:1.6">
          Your data will be saved in the cloud and accessible from <strong style="color:var(--text2)">any device</strong>.<br><br>
          1. Go to <strong style="color:var(--gold)">supabase.com</strong> → create a free project<br>
          2. Run the <code style="background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:11px">schema.sql</code> in SQL Editor<br>
          3. Go to <strong style="color:var(--gold)">Project Settings → API</strong> and paste your keys below
        </div>
        <div style="margin-bottom:14px">
          <label style="display:block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Project URL</label>
          <input id="setup-url" type="text" placeholder="https://xxxxxxxxxxxx.supabase.co"
            style="width:100%;background:var(--bg3);border:.5px solid var(--border2);border-radius:8px;padding:11px 14px;font-size:13px;color:var(--text);font-family:\'DM Sans\',sans-serif;outline:none">
        </div>
        <div style="margin-bottom:20px">
          <label style="display:block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Anon Public Key</label>
          <input id="setup-key" type="text" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            style="width:100%;background:var(--bg3);border:.5px solid var(--border2);border-radius:8px;padding:11px 14px;font-size:13px;color:var(--text);font-family:\'DM Sans\',sans-serif;outline:none">
        </div>
        <button onclick="applySetup()"
          style="width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0F0E0D;font-family:\'DM Sans\',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:12px;cursor:pointer;letter-spacing:.02em">
          Connect & Continue
        </button>
        <div id="setup-error" style="color:var(--red-text);font-size:12px;margin-top:10px;text-align:center;min-height:18px"></div>
      </div>
      <div style="font-size:11px;color:var(--text3);text-align:center;margin-top:20px;line-height:1.6">
        Your keys are stored in your browser only.<br>They are never sent anywhere except Supabase.
      </div>`;
    document.body.appendChild(setup);
  }
  setup.style.display='flex';
}

async function applySetup(){
  const url=(document.getElementById('setup-url').value||'').trim();
  const key=(document.getElementById('setup-key').value||'').trim();
  const errEl=document.getElementById('setup-error');
  if(!url.startsWith('https://')||!key.startsWith('eyJ')){
    errEl.textContent='Please enter valid Supabase URL and anon key.';return;
  }
  errEl.textContent='Testing connection…';
  try{
    const test=supabase.createClient(url,key);
    const{error}=await test.auth.getSession();
    if(error)throw error;
    localStorage.setItem('fz-sb-url',url);
    localStorage.setItem('fz-sb-key',key);
    errEl.textContent='✓ Connected! Loading…';
    errEl.style.color='var(--green-text)';
    setTimeout(()=>location.reload(), 800);
  }catch(e){
    errEl.textContent='Connection failed — check your keys and try again.';
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
const _url = SUPABASE_URL !== 'YOUR_SUPABASE_URL' ? SUPABASE_URL : (localStorage.getItem('fz-sb-url') || '');
const _key = SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY' ? SUPABASE_ANON_KEY : (localStorage.getItem('fz-sb-key') || '');

// SB = single authoritative Supabase client used everywhere in the app
let SB;

if (!_url || !_key) {
  document.getElementById('loading-screen').style.display = 'none';
  showSetupScreen();
} else {
  SB = supabase.createClient(_url, _key, {
    auth: { persistSession: true, autoRefreshToken: true, storageKey: 'fz-auth' }
  });

  let booted = false;

  // Safety net — if Supabase never responds within 5s, show auth screen
  const bootTimeout = setTimeout(() => {
    if (!booted) {
      booted = true;
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('auth-screen').style.display = 'flex';
    }
  }, 5000);

  SB.auth.onAuthStateChange(async (event, session) => {
    // Ignore token refresh events — they don't need a UI change
    if (event === 'TOKEN_REFRESHED') return;

    clearTimeout(bootTimeout);

    if (session?.user) {
      if (booted) return; // already running, ignore duplicate events
      booted = true;
      USER = session.user;

      // Step 1: Load from local cache instantly → show app with no delay
      const hasCache = loadCache(USER.id);
      showApp(); // renders immediately (empty or from cache)

      // Step 2: Sync from Supabase in background — no spinner, no wait
      try {
        await loadAllData(USER.id);
        renderTab(); // silently refresh UI with latest server data
      } catch (e) {
        console.warn('Background sync failed, showing cached data', e);
      }

    } else {
      if (booted && USER) {
        // Explicit sign-out
        booted = false; USER = null; txns = []; startBals = {};
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('bottom-nav').style.display = 'none';
        document.getElementById('fab').style.display = 'none';
        document.getElementById('auth-screen').style.display = 'flex';
      } else if (!booted) {
        booted = true;
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('auth-screen').style.display = 'flex';
      }
    }
  });
}
</script>
